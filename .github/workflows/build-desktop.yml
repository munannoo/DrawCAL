name: Build Desktop Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact_name: DrawCAL-linux
          - name: macOS
            os: macos-latest
            artifact_name: DrawCAL-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcursor-dev \
            libxinerama-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist

          # CMake intentionally places every configuration in the repository's
          # drawcal directory, not inside the build tree.
          executable="drawcal/drawcal"
          if [ ! -f "$executable" ]; then
            echo "Expected executable was not produced at $executable"
            find drawcal build -maxdepth 4 -type f -print || true
            exit 1
          fi

          cp "$executable" dist/drawcal
          chmod +x dist/drawcal
          cp -R drawcal/shaders dist/shaders
          cp -R drawcal/textures dist/textures
          if [ -f scene.drawcal ]; then cp scene.drawcal dist/; fi

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
